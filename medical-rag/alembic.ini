# -*- coding: utf-8 -*-
# Alembic configuration file
# Dat tai: medical-rag/alembic.ini

[alembic]
# Duong dan toi thu muc chua migrations
script_location = alembic

# Template cho ten file migration
file_template = %%(rev)s_%%(slug)s

# Timezone cho timestamp trong migration files
timezone = UTC

# Truncate slug dai qua
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

# SQLAlchemy URL — bi override trong env.py bang gia tri tu .env
# De trong vi env.py se doc tu Settings
sqlalchemy.url =

[post_write_hooks]
# Tu dong format migration file sau khi autogenerate
# Bo comment neu co ruff cai san:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
