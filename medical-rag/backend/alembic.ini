# -*- coding: utf-8 -*-
# Alembic configuration — medical-rag/backend/alembic.ini

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40
output_encoding = utf-8

# URL is overridden in env.py via Settings — leave blank here
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
