<div class="emergency-banner">
  <div class="emerg-content">
    <i class="pi pi-exclamation-triangle emerg-icon"></i>
    <div class="emerg-text">
      <div class="emerg-title">CẢNH BÁO: Triệu chứng có thể nghiêm trọng</div>
      <div class="emerg-hotline">Gọi ngay cấp cứu: <strong>115</strong></div>
    </div>
  </div>
  <button type="button" class="emerg-dismiss" (click)="dismissed.emit()" title="Đóng cảnh báo">
    <i class="pi pi-times"></i>
  </button>
</div>
