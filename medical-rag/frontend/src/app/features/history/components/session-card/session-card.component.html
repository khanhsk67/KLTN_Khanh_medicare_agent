<div class="session-card" (click)="viewRequested.emit(session().id)">
  <div class="session-icon">
    <i class="pi pi-comments"></i>
  </div>

  <div class="session-body">
    <div class="session-title">{{ session().title || 'Cuộc tư vấn' }}</div>
    <div class="session-meta">
      <span><i class="pi pi-clock"></i> {{ session().created_at | relativeTime }}</span>
      <span><i class="pi pi-comments"></i> {{ session().message_count ?? 0 }} tin nhắn</span>
    </div>
  </div>

  <div class="session-actions">
    <button type="button"
            class="action-btn view"
            pTooltip="Xem chi tiết"
            tooltipPosition="top"
            (click)="$event.stopPropagation(); viewRequested.emit(session().id)">
      <i class="pi pi-arrow-right"></i>
    </button>
    <button type="button"
            class="action-btn delete"
            pTooltip="Xóa phiên"
            tooltipPosition="top"
            (click)="$event.stopPropagation(); deleteRequested.emit(session().id)">
      <i class="pi pi-trash"></i>
    </button>
  </div>
</div>
