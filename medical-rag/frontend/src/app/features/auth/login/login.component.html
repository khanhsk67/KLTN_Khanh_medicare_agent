<p-toast position="top-right"/>

<!-- Wrapper toàn trang: ảnh nền -->
<div class="page-wrapper relative">
  <img src="assets/images/hero-cover.jpg" alt="bg" class="bg-image absolute"/>

  <!-- Navbar -->
  <nav class="relative z-1 flex align-items-center justify-content-between px-6 py-4">
    <span class="text-white font-bold text-xl">MediCare AI</span>
    <ul class="flex gap-5 list-none m-0 p-0">
      <li><a href="#" class="text-white text-sm no-underline">Home</a></li>
      <li><a href="#" class="text-white text-sm no-underline">Product</a></li>
      <li><a href="#" class="text-white text-sm no-underline">Pricing</a></li>
      <li><a href="#" class="text-white text-sm no-underline">Contact</a></li>
    </ul>
    <p-button label="Get Quote Now" icon="pi pi-arrow-right"
              iconPos="right" size="small"/>
  </nav>

  <!-- Content -->
  <div class="relative z-1 flex align-items-center justify-content-between px-6 py-6 gap-4">

    <div class="flex flex-column gap-4">
      <h1 class="text-white font-bold m-0" style="font-size:2.6rem;line-height:1.15">
        Meet the Best<br>Hospital
      </h1>
      <p class="m-0 text-base line-height-3"
         style="color:rgba(255,255,255,0.85);max-width:340px">
        Your trusted health companion, <br>anytime you need care
      </p>
      <div class="flex gap-3">
        <p-button label="Get Quote Now" [rounded]="true" size="small"/>
        <p-button label="Learn More" [rounded]="true" [outlined]="true"
                  size="small" styleClass="text-white border-white"/>
      </div>
    </div>

    <div class="surface-0 border-round-xl p-5 flex flex-column gap-3"
         style="width:300px;flex-shrink:0">
      <h2 class="text-center font-bold m-0 text-xl" style="letter-spacing:1px">
        SIGN IN
      </h2>

      <p-fluid>
        <form [formGroup]="form" (ngSubmit)="onSubmit()"
              class="flex flex-column gap-3">

          <!-- Email -->
          <div class="flex flex-column gap-1">
            <label class="text-sm font-semibold">
              Email address <span class="text-red-500">*</span>
            </label>
            <input pInputText formControlName="email" type="email"
                   placeholder="example@gmail.com"
                   [class.ng-invalid]="isInvalid('email')"
                   [class.ng-dirty]="isInvalid('email')"/>
            @if (isInvalid('email')) {
              <small class="text-red-500">Email không hợp lệ</small>
            }
          </div>

          <!-- Password -->
          <div class="flex flex-column gap-1">
            <label class="text-sm font-semibold">Password <span class="text-red-500">*</span></label>
            <p-password formControlName="password"
                        placeholder="Password"
                        [feedback]="false"
                        [toggleMask]="true"
                        class="w-full"
                        inputStyleClass="w-full"
                        [class.ng-invalid]="isInvalid('password')"
                        [class.ng-dirty]="isInvalid('password')"/>
            @if (isInvalid('password')) {
              <small class="text-red-500">Mật khẩu tối thiểu 6 ký tự</small>
            }
          </div>

            <p-message *ngIf="errorMessage" severity="error" class="w-full">{{ errorMessage }}</p-message>
          

          <!-- Submit -->
          <p-button type="submit" label="Sign in"
                    styleClass="w-full justify-content-center"
                    [loading]="isLoading"
                    [disabled]="isLoading"/>

          <p class="text-center text-sm m-0" style="color:#999">
            Chưa có tài khoản?
            <a routerLink="/auth/register"
               class="text-primary no-underline font-semibold">Đăng ký</a>
          </p>

        </form>
      </p-fluid>
    </div>

  </div>
</div>
