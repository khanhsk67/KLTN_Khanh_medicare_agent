<nav class="navbar">

  <!-- Brand -->
  <a routerLink="/analysis" class="brand">
    <i class="pi pi-heart-fill"></i>
    <span class="brand-name">MediCare AI</span>
  </a>

  <!-- Nav links -->
  <div class="nav-links">
    <a routerLink="/chat" routerLinkActive="active" class="nav-link">
      <i class="pi pi-comments"></i>
      <span>Tư vấn</span>
    </a>
    <a routerLink="/analysis" routerLinkActive="active" class="nav-link">
      <i class="pi pi-chart-line"></i>
      <span>Phân tích</span>
    </a>
    <a routerLink="/history" routerLinkActive="active" class="nav-link">
      <i class="pi pi-history"></i>
      <span>Lịch sử</span>
    </a>
  </div>

  <!-- Right group -->
  <div class="nav-right">

    @if (authService.isAuthenticated()) {
      <app-wallet-widget/>
    }

    <!-- Theme toggle -->
    <button type="button"
            class="theme-toggle"
            (click)="toggleTheme()"
            [attr.aria-label]="themeMode() === 'dark' ? 'Light mode' : 'Dark mode'"
            [title]="themeMode() === 'dark' ? 'Light mode' : 'Dark mode'">
      <i class="pi" [class.pi-sun]="themeMode() === 'dark'" [class.pi-moon]="themeMode() === 'light'"></i>
    </button>

    <!-- Avatar dropdown -->
    <button type="button"
            class="avatar-btn"
            (click)="userMenu.toggle($event)"
            [title]="user()?.full_name || user()?.email || 'Tài khoản'">
      <span class="avatar">{{ userInitials() }}</span>
    </button>

    <p-menu #userMenu [model]="userMenuItems" [popup]="true" styleClass="navbar-user-menu"/>
  </div>
</nav>
