<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>MediCare AI</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('medicare-theme');
        if (saved === 'dark') document.body.classList.add('dark-mode');
      } catch (e) {}
    })();
  </script>
  <app-root></app-root>
</body>
</html>
